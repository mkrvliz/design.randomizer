<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тема для макета</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #191919;
      --surface: #222222;
      --surface-hover: #2a2a2a;
      --ink: #e6e6e6;
      --ink-secondary: #999999;
      --ink-tertiary: #555555;
      --accent: #ffffff;
      --border: #333333;
      --border-light: #2e2e2e;
      --tag-bg: #2a2a2a;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 1.5rem;
      left: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon {
      width: 20px;
      height: 20px;
      background: var(--ink);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 12px;
      height: 12px;
      fill: var(--bg);
    }

    .logo-main {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .counter {
      position: fixed;
      top: 1.6rem;
      right: 1.75rem;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--ink-tertiary);
    }

    .counter span {
      color: var(--ink-secondary);
    }

    /* Main layout */
    .wrapper {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    /* Eyebrow
    .eyebrow {
      font-size: rem;
      font-weight: 400;
      color: var(--ink-tertiary);
      text-align: center;
      letter-spacing: 0.01em;
    }
       */

    /* Card */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 2.25rem;
      position: relative;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.25rem;
      transition: opacity 0.12s ease;
    }

    .card.flash {
      opacity: 0;
    }

    .card-number {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--ink-tertiary);
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      user-select: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--ink-secondary);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      width: fit-content;
      letter-spacing: 0.01em;
    }

    .card-title {
      font-family: 'Lora', serif;
      font-size: 1.9rem;
      line-height: 1.25;
      color: var(--ink);
      font-weight: 400;
    }

    .card-context {
      font-size: 0.85rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink-secondary);
      border-top: 1px solid var(--border-light);
      padding-top: 1.1rem;
    }

    /* Button */
    .btn {
      position: relative;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s ease, border-color 0.1s ease;
      letter-spacing: -0.01em;
    }

    .btn:hover {
      background: var(--surface-hover);
      border-color: #444444;
    }

    .btn:active { transform: scale(0.98); }

    .btn span {
      position: relative;
      z-index: 1;
    }

    /* History */
    .history-label {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--ink-tertiary);
      width: 100%;
      text-align: center;
    }

    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      width: 100%;
    }

    .history-item {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--ink-tertiary);
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      animation: fadeUp 0.3s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .empty-arrow {
      font-size: 2rem;
      color: var(--ink-tertiary);
      animation: bounce 2s ease-in-out infinite;
      display: block;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    .empty-text {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 2rem;
      color: var(--ink-tertiary);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-icon">
      <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="4" height="4" rx="0.5"/>
        <rect x="7" y="1" width="4" height="4" rx="0.5"/>
        <rect x="1" y="7" width="4" height="4" rx="0.5"/>
        <rect x="7" y="7" width="4" height="4" rx="0.5"/>
      </svg>
    </div>
    <span class="logo-main">Рандомайзер тем</span>
  </header>

  <div class="counter" id="counter" style="display:none">
    Показано: <span id="countNum">0</span>
  </div>

  <div class="wrapper">

    <div class="card" id="card">
      <div class="empty-state">
        <p class="empty-text">Нажми кнопку — получи тему</p>
        <span class="empty-arrow">↓</span>
      </div>
    </div>

    <button class="btn" id="btn" onclick="getTheme()">
      <span id="btnText">Выдать тему</span>
    </button>

    <div id="historyWrap" style="display:none; flex-direction:column; align-items:center; gap:0.6rem; width:100%">
      <p class="history-label">Предыдущие</p>
      <div class="history" id="history"></div>
    </div>
  </div>

  <script>
    let history = [];
    let count = 0;
    let isLoading = false;

    async function getTheme() {
      if (isLoading) return;
      
      const card = document.getElementById('card');
      card.classList.add('flash');
      isLoading = true;

      try {
        const response = await fetch('http://localhost:3000/api/theme');
        if (!response.ok) {
          throw new Error('Failed to fetch theme');
        }
        const theme = await response.json();

        setTimeout(() => {
          count++;
          document.getElementById('countNum').textContent = count;
          document.getElementById('counter').style.display = 'block';

          // Update card
          card.innerHTML = `
            <div class="card-number">${String(count).padStart(2, '0')}</div>
            <div class="tag">${theme.tag}</div>
            <h2 class="card-title">${theme.title}</h2>
            <p class="card-context">${theme.context}</p>
          `;

          card.classList.remove('flash');

          // Update button text
          document.getElementById('btnText').textContent = 'Следующая тема';

          // History (show last 5)
          if (count > 1) {
            history.unshift(theme.title);
            if (history.length > 5) history.pop();

            const wrap = document.getElementById('historyWrap');
            wrap.style.display = 'flex';
            const histEl = document.getElementById('history');
            histEl.innerHTML = history.map((t, i) =>
              `<span class="history-item" style="animation-delay:${i * 0.05}s">${t}</span>`
            ).join('');
          }

          isLoading = false;
        }, 150);
      } catch (error) {
        console.error('Error:', error);
        card.innerHTML = `
          <div class="empty-state">
            <p class="empty-text" style="color: #ff6b6b;">Ошибка подключения к серверу</p>
            <p style="font-size: 0.8rem; color: #999;">Убедись, что бэкенд запущен на localhost:3000</p>
          </div>
        `;
        card.classList.remove('flash');
        isLoading = false;
      }
    }
  </script>
</body>
</html>
