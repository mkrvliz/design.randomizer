<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тема для макета</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #191919;
      --surface: #222222;
      --surface-hover: #2a2a2a;
      --ink: #F9F9F9;
      --ink-secondary: #999999;
      --ink-tertiary: #555555;
      --accent: #F9F9F9;
      --border: #333333;
      --border-light: #2e2e2e;
      --tag-bg: #2a2a2a;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 1.5rem;
      left: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon {
      width: 20px;
      height: 20px;
      background: var(--ink);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 12px;
      height: 12px;
      fill: var(--bg);
    }

    .logo-main {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 2.25rem;
      position: relative;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.25rem;
      transition: opacity 0.12s ease;
    }

    .card.flash {
      opacity: 0;
    }

    .card-number {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--ink-tertiary);
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      user-select: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--ink-secondary);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      width: fit-content;
      letter-spacing: 0.01em;
    }

    .card-title {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 1.9rem;
      line-height: 1.25;
      color: var(--ink);
      font-weight: 400;
    }

    .card-brand {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-context {
      font-size: 0.85rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink-secondary);
      border-top: 1px solid var(--border-light);
      padding-top: 1.1rem;
    }

    .btn {
      position: relative;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s ease, border-color 0.1s ease;
      letter-spacing: -0.01em;
    }

    .btn:hover {
      background: var(--surface-hover);
      border-color: #444444;
    }

    .btn:active { transform: scale(0.98); }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .empty-state {
      text-align: center;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .empty-arrow {
      font-size: 2rem;
      color: var(--ink-tertiary);
      animation: bounce 2s ease-in-out infinite;
      display: block;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    .empty-text {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink-tertiary);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-icon">
      <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="4" height="4" rx="0.5"/>
        <rect x="7" y="1" width="4" height="4" rx="0.5"/>
        <rect x="1" y="7" width="4" height="4" rx="0.5"/>
        <rect x="7" y="7" width="4" height="4" rx="0.5"/>
      </svg>
    </div>
    <span class="logo-main">Дизайн-рандомайзер</span>
  </header>

  <div class="wrapper">
    <div class="card" id="card">
      <div class="empty-state">
        <p class="empty-text">Нажми кнопку — получи тему</p>
        <span class="empty-arrow">↓</span>
      </div>
    </div>

    <button class="btn" id="btn" onclick="getTheme()">
      <span id="btnText">Выдать тему</span>
    </button>
  </div>

  <script>
    const themes = [
      { brand: "Глина & Утро", title: "посуда с текстурой природных материалов", context: "миски, кружки и вазы с оттисками листьев, коры и мха — каждый предмет сохраняет след живой природы. Небольшая мастерская с открытыми мастер-классами по выходным. Идеально для подарков и уютного интерьера." },
      { brand: "Тёплый круг", title: "кружки и чайники ручной работы", context: "семейная мастерская из двух человек, делает посуду малыми сериями по 20–30 штук. Сотрудничает с локальными спешелти-кофейнями — поставляет фирменные кружки под их меню. Глазури разрабатываются с нуля, у каждой коллекции свой характер." },
      { brand: "Лён в клетку", title: "постельное бельё и домашний текстиль из варёного льна", context: "бренд работает с проверенным белорусским льном, шьёт в небольшом ателье под Москвой. Палитра ограничена пятью пыльными оттенками — никакой яркости, только спокойные тона. Аудитория — те, кто покупает один раз и надолго, ценит натуральные материалы и спокойную эстетику." },
      { brand: "Дымка", title: "соевые свечи с ароматами северных лесов", context: "лимитированные капсулы по сезонам — весной хвоя и берёза, осенью мох и дым костра. Все ароматы создаёт парфюмер-самоучка, основательница бренда. Свечи разливаются вручную в студии, упаковка — крафт и сургучная печать." },
      { brand: "Прозрачно", title: "стеклодувная мастерская, питьевые стаканы и графины", context: "один мастер с 15-летним опытом, всё выдувается вручную при клиентах в открытой студии. Каждый предмет уникален — нет двух одинаковых стаканов. Можно записаться на индивидуальный мастер-класс и выдуть свой стакан под руководством." },
      { brand: "Сруб", title: "разделочные доски и подносы из карельской берёзы", context: "мастер работает с деревом из своего региона, использует только сухостой и упавшие деревья. Гравировка на заказ — имена, даты, цитаты. Популярный свадебный и корпоративный подарок, доски маркируются номером и подписью мастера." },
      { brand: "Северянка", title: "базовый трикотаж oversize", context: "всё шьётся в одной мастерской под Питером, тиражи по 50 штук. Принцип бренда — никаких сезонных коллекций, только постоянная капсула, которую можно докупать и доносить годами. Аудитория — женщины 25–40, уставшие от быстрой моды." },
      { brand: "Полынь", title: "женские льняные платья в стиле бохо-минимализм", context: "сезонные дропы по 4–6 моделей, каждая в трёх натуральных оттенках. Основательница лично снимает лукбук в полях и на побережье. Целевая аудитория — творческие женщины, кто ездит на ретриты и ценит свободный крой." },
      { brand: "Кант", title: "мужские рубашки из японского денима", context: "лимит 30 штук на модель, каждая рубашка пронумерована. Шьётся в ателье в Москве, фурнитура и пуговицы из Японии. Аудитория — мужчины 30+, ценящие крафт, готовые ждать рубашку 3–4 недели и платить за качество ткани." },
      { brand: "Жук", title: "комбинезоны и боди из органического хлопка", context: "принты разрабатывают детские иллюстраторы, каждая коллекция — отдельная история про жука, ёжика или лису. Безопасные красители, плоские швы, кнопки вместо пуговиц. Бренд активен в инстаграме мам, основной канал — сарафан и рекомендации." },
      { brand: "Овца", title: "вязаные шапки и снуды из мериноса", context: "бренд работает напрямую с фермой в Дагестане, на каждой шапке бирка с именем овцы, от которой шерсть. Вязание ручное, мастерица одна, отсюда лимит — 10–15 шапок в неделю. Сезон стартует в сентябре, к декабрю всё распродано." },
      { brand: "Босиком", title: "анатомические сандалии ручной сборки", context: "кожа растительного дубления из Италии, колодка разработана ортопедом. Шьются на заказ под обмер стопы — клиент присылает фото и замеры. Аудитория — те, кто перешёл на минималистичную обувь и не возвращается обратно." },
      { brand: "Холщовка", title: "холщовые сумки и тоуты с авторскими принтами", context: "коллабы с молодыми художниками — каждые 2 месяца новый автор и новая коллекция из 4–5 принтов. Часть выручки идёт автору как роялти. Цена доступная, аудитория — студенты, художники, посетители независимых книжных и кофеен." },
      { brand: "Серебро и шум", title: "авторские серебряные кольца с грубой фактурой", context: "единичные экземпляры, ювелир делает кольца методом литья по восковой модели — двух одинаковых не существует. Эстетика брутальная, никакой полировки до блеска. Аудитория — те, кто носит украшения каждый день и не снимает." },
      { brand: "Жемчужница", title: "украшения из речного жемчуга неправильной формы", context: "основательница — женщина-ювелир, работает с барочным жемчугом (несимметричным). Серьги, кольца и подвески в серебре и золочении. Эстетика тихой роскоши, аудитория — женщины 30+, выбирающие украшения «на каждый день, но не базовые»." },
      { brand: "Латунь", title: "латунные серьги и браслеты в эстетике 70-х", context: "винтажные мотивы — крупные геометричные формы, матовая поверхность, состаренная фактура. Мастер вдохновляется советскими ювелирными журналами 70-х и переосмысляет формы. Цена средняя, аудитория — девушки, которые собирают образ из винтажа и носят украшения как акцент." },
      { brand: "Корень", title: "кулоны из засушенных растений в эпоксидной смоле", context: "основательница собирает растения сама — в походах, на даче, в городских скверах. Каждый кулон сопровождается карточкой с названием растения и местом сбора. Аудитория — те, кто любит флористику, ботанику, природу — украшение становится личной историей, а не просто аксессуаром." },
      { brand: "Травник", title: "натуральные бальзамы и масла на сибирских травах", context: "сырьё закупается у сибирских сборщиков, рецептуру разрабатывает основательница — биолог по образованию. Эко-упаковка из стекла и крафта, никакого пластика. Аудитория — женщины, которые читают составы и не покупают масс-маркет." },
      { brand: "Мыловарня №7", title: "твёрдое мыло и шампуни малыми партиями", context: "минимум ингредиентов — 5–7 в каждом продукте, всё веган, без пальмового масла. Линейка из 7 ароматов, отсюда название. Продаётся в шоуруме и через сайт, упаковка — переработанная бумага с ручной печатью. Аудитория — осознанное потребление, zero waste, экоактивисты." },
      { brand: "Нота", title: "нишевые духи с ароматами городов", context: "каждый аромат — попытка передать город через запах: Тбилиси, Лиссабон, Калининград, Владивосток. Малые партии по 100 флаконов, сольные релизы. Парфюмер — выпускник школы Гераса в Грассе. Аудитория — путешественники и парфманьяки, кто коллекционирует нишу." },
      { brand: "Дед", title: "масла и бальзамы для бороды", context: "ироничная коммуникация — упаковка стилизована под советскую аптеку, тексты на банках с юмором. Состав честно натуральный, разрабатывался с барбером. Аудитория — мужчины 25–45 с бородой, ценящие самоиронию и не любящие пафос beauty-индустрии." },
      { brand: "Ладонь", title: "кремы и скрабы для рук, которые работают руками", context: "целевая аудитория — керамисты, садовники, художники, парикмахеры, повара. Формулы плотные, восстанавливающие, с акцентом на трещины и сухость. Часть линейки — в металлических банках, чтобы можно было открыть грязными руками. Бренд активно делает коллабы с мастерскими." },
      { brand: "Аня Море", title: "семейная и lifestyle-съёмка на плёнку", context: "Аня снимает только на плёночные камеры — Pentax 67 и Mamiya. Выезжает в путешествия с семьями, снимает ретриты, семейные истории на побережье и в горах. Очередь на съёмки на 2–3 месяца вперёд. Аудитория — родители 30+, которые хотят память «как раньше», без обработки и фильтров." },
      { brand: "Студия 24", title: "предметная съёмка для малых брендов", context: "бюджетные пакеты для начинающих — от 15 кадров за фиксированную цену. Студия в спальном районе, оборудование на минимуме, но результат стабильный. Целевая аудитория — самозанятые мастера и небольшие шоурумы, которым нужны качественные карточки на маркетплейсы и в инстаграм." },
      { brand: "Кадр", title: "короткие документальные фильмы о людях и ремёслах", context: "команда из двух человек — оператор и режиссёр. Снимают истории мастеров, фермеров, маленьких бизнесов в формате 3–7 минут. Стилистика спокойная, без музыкальных перегрузок и быстрого монтажа. Заказчики — бренды, которым нужен не рекламный ролик, а нарратив о людях за продуктом." },
      { brand: "Маша рисует", title: "портреты на заказ, обложки книг, открытки", context: "акварель и тушь, узнаваемая лёгкая линия. Маша работает в одиночку из домашней студии, принимает 5–7 заказов в месяц. Помимо клиентских работ, есть собственный мерч — открытки, постеры, блокноты. Аудитория клиентов — частники с подарками и небольшие издательства." },
      { brand: "Лицо", title: "свадебный и выездной макияж", context: "чистая натуральная стилистика — никакого «инстаграмного» макияжа со стрелками и контурингом. Целевая аудитория — невесты 27–35, которые хотят выглядеть «как себя, только лучше». Работает по Москве и области, плюс выездные свадьбы по России и за границей. Запись через личный инстаграм." },
      { brand: "Гардероб", title: "разбор гардероба и шопинг-сопровождение", context: "стилист работает онлайн (видеосозвон с гардеробом) и офлайн (выезд на дом + поход по магазинам). Не работает с трендами — фокус на индивидуальном стиле и капсуле. Аудитория — женщины 30–45, которые «потерялись» в гардеробе после декрета или смены работы." },
      { brand: "Тонко", title: "минималистичные тату тонкой линией", context: "студия на одно кресло в центре города, мастер работает по предзаписи. Эскизы только авторские — никаких «скачанных из пинтереста». Запись через анкету: клиент описывает идею, мастер сам решает, берёт ли. Аудитория — девушки 20–30, для кого тату — это эстетика, а не история." },
      { brand: "Усы", title: "барбершоп на одно кресло", context: "запись только через директ инстаграма, никаких онлайн-сервисов. Один мастер, один клиент в час, без спешки. Атмосфера — старая школа, виниловый проигрыватель, кофе в гранёных стаканах. Аудитория — мужчины, которым важна не скорость, а ритуал." },
      { brand: "Лиза ведёт", title: "упаковка и ведение экспертных блогов", context: "специализация — локальные бренды и эксперты (психологи, нутрициологи, дизайнеры). Не работает с большими бюджетами и крупными аккаунтами — фокус на малом бизнесе, где нужна стратегия с нуля. Подход: сначала исследование аудитории и тон-оф-войс, потом контент-план, потом запуск. Клиентов берёт ограниченно, очередь на 1–2 месяца." },
      { brand: "Слово", title: "тексты для сайтов, тон-оф-войс, нейминг", context: "копирайтер работает один, специализация — лендинги и брендинг для малых бизнесов в крафт-сфере. Не пишет SEO-простыни и продающие тексты «по формуле AIDA» — фокус на голосе бренда. Аудитория — основатели мастерских и шоурумов, которым нужно «звучать как живые люди»." },
      { brand: "Разговор", title: "частная практика, КПТ", context: "психолог работает онлайн, специализация — тревожные расстройства и выгорание. Сессии 50 минут, формат — раз в неделю. Не ведёт громкий блог, но есть рассылка раз в месяц с заметками про работу с тревогой. Аудитория — взрослые 25–40, которые ищут «своего» психолога по рекомендациям." },
      { brand: "Звук", title: "занятия с детьми онлайн", context: "авторская методика — игровой формат через зум, занятия по 30 минут. Специализация — постановка звуков у детей 4–7 лет. Логопед записывает короткие видео-разборы для родителей в инстаграм. Аудитория — родители из небольших городов, где нет хорошего офлайн-логопеда." },

    ];

    const shown = new Set();
    let isLoading = false;

    function getTheme() {
      if (isLoading) return;

      if (shown.size === themes.length) shown.clear();
      const remaining = themes.filter((_, i) => !shown.has(i));
      const idx = themes.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
      shown.add(idx);
      const theme = themes[idx];

      const card = document.getElementById('card');
      card.classList.add('flash');
      isLoading = true;

      setTimeout(() => {
        const title = theme.title.charAt(0).toUpperCase() + theme.title.slice(1);
        card.innerHTML = `
          <div class="card-brand">${theme.brand}</div>
          <h2 class="card-title">${title}</h2>
          <p class="card-context">${theme.context}</p>
        `;
        card.classList.remove('flash');
        document.getElementById('btnText').textContent = 'Следующая тема';
        isLoading = false;
      }, 150);
    }
  </script>
