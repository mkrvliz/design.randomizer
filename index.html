<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тема для макета</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #191919;
      --surface: #222222;
      --surface-hover: #2a2a2a;
      --ink: #F9F9F9;
      --ink-secondary: #999999;
      --ink-tertiary: #555555;
      --accent: #F9F9F9;
      --border: #333333;
      --border-light: #2e2e2e;
      --tag-bg: #2a2a2a;
    }

    :root[data-theme="light"] {
      --bg: #F5F3EE;
      --surface: #FFFFFF;
      --surface-hover: #F0EEE8;
      --ink: #1A1A1A;
      --ink-secondary: #6B6B6B;
      --ink-tertiary: #B0B0B0;
      --accent: #1A1A1A;
      --border: #E2DED6;
      --border-light: #EDEAE3;
      --tag-bg: #F0EEE8;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon {
      width: 20px;
      height: 20px;
      background: var(--ink);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 12px;
      height: 12px;
      fill: var(--bg);
    }

    .logo-main {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .theme-toggle {
      width: 34px;
      height: 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: background 0.1s ease, border-color 0.1s ease;
      padding: 0;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background: var(--surface-hover);
      border-color: var(--ink-tertiary);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }

    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    :root[data-theme="light"] .theme-toggle .icon-sun { display: block; }
    :root[data-theme="light"] .theme-toggle .icon-moon { display: none; }

    .wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      margin: auto 0;
      padding: 1rem 1.25rem 2rem;
    }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 2.25rem;
      position: relative;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.25rem;
      transition: opacity 0.12s ease;
    }

    .card.flash {
      opacity: 0;
    }

    .card-number {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--ink-tertiary);
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      user-select: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--ink-secondary);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      width: fit-content;
      letter-spacing: 0.01em;
    }

    .card-title {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 1.9rem;
      line-height: 1.25;
      color: var(--ink);
      font-weight: 400;
    }

    .card-brand {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-context {
      font-size: 0.85rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink-secondary);
      border-top: 1px solid var(--border-light);
      padding-top: 1.1rem;
    }

    .palette {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    .swatch {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-width: 0;
    }

    .swatch-color {
      width: 100%;
      height: 56px;
      border-radius: 6px;
      border: 1px solid var(--border-light);
    }

    .swatch-hex {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--ink-secondary);
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .btn {
      position: relative;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s ease, border-color 0.1s ease;
      letter-spacing: -0.01em;
    }

    .btn:hover {
      background: var(--surface-hover);
      border-color: #444444;
    }

    .btn:active { transform: scale(0.98); }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .empty-state {
      text-align: center;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .empty-arrow {
      font-size: 2rem;
      color: var(--ink-tertiary);
      animation: bounce 2s ease-in-out infinite;
      display: block;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    .empty-text {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink-tertiary);
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .wrapper { max-width: 100%; }
      .card { padding: 1.75rem 1.5rem; gap: 1.1rem; }
      .card-title { font-size: 1.5rem; }
      .empty-text { font-size: 1rem; white-space: normal; text-align: center; }
      .swatch-color { height: 48px; }
      .swatch-hex { font-size: 0.65rem; letter-spacing: 0.02em; }
      .palette { gap: 0.4rem; }
    }

    @media (max-width: 360px) {
      .card { padding: 1.5rem 1.25rem; }
      .swatch-hex { font-size: 0.6rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="4" height="4" rx="0.5"/>
          <rect x="7" y="1" width="4" height="4" rx="0.5"/>
          <rect x="1" y="7" width="4" height="4" rx="0.5"/>
          <rect x="7" y="7" width="4" height="4" rx="0.5"/>
        </svg>
      </div>
      <span class="logo-main">Дизайн-рандомайзер</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Переключить тему">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="4"/>
        <line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
        <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="4" y2="12"/>
        <line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/>
        <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
      </svg>
    </button>
  </header>

  <div class="wrapper">
    <div class="card" id="card">
      <div class="empty-state">
        <p class="empty-text">Нажми кнопку — получи тему</p>
        <span class="empty-arrow">↓</span>
      </div>
    </div>

    <button class="btn" id="btn" onclick="getTheme()">
      <span id="btnText">Выдать тему</span>
    </button>
  </div>

  <script>
    function toggleTheme() {
      const root = document.documentElement;
      const next = root.dataset.theme === 'light' ? 'dark' : 'light';
      root.dataset.theme = next;
      localStorage.setItem('theme', next);
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) document.documentElement.dataset.theme = savedTheme;

    const SHORT_WORDS = 'а|и|но|да|или|либо|в|во|на|над|под|за|у|к|ко|о|об|обо|от|по|до|из|изо|без|для|про|при|с|со|не|ни|же|ли|бы|то|как|что';
    const HANG_RE = new RegExp(`(^|[\\s(«"'—–-])(${SHORT_WORDS})\\s`, 'gi');
    function nobr(text) {
      return text.replace(HANG_RE, '$1$2 ');
    }

    const themes = [
      { brand: "Глина & Утро", title: "посуда с текстурой природных материалов", context: "миски, кружки и вазы с оттисками листьев, коры и мха — каждый предмет сохраняет след живой природы. Небольшая мастерская с открытыми мастер-классами по выходным. Идеально для подарков и уютного интерьера.", palette: ["#8B6F47", "#C9B79C", "#4A3F35"] },
      { brand: "Тёплый круг", title: "кружки и чайники ручной работы", context: "семейная мастерская из двух человек, делает посуду малыми сериями по 20–30 штук. Сотрудничает с локальными спешелти-кофейнями — поставляет фирменные кружки под их меню. Глазури разрабатываются с нуля, у каждой коллекции свой характер.", palette: ["#A9714B", "#E8D4B8", "#5C3D2E"] },
      { brand: "Лён в клетку", title: "постельное бельё и домашний текстиль из варёного льна", context: "бренд работает с проверенным белорусским льном, шьёт в небольшом ателье под Москвой. Палитра ограничена пятью пыльными оттенками — никакой яркости, только спокойные тона. Аудитория — те, кто покупает один раз и надолго, ценит натуральные материалы и спокойную эстетику.", palette: ["#B5A89A", "#D4C9B8", "#6E5D4B"] },
      { brand: "Дымка", title: "соевые свечи с ароматами северных лесов", context: "лимитированные капсулы по сезонам — весной хвоя и берёза, осенью мох и дым костра. Все ароматы создаёт парфюмер-самоучка, основательница бренда. Свечи разливаются вручную в студии, упаковка — крафт и сургучная печать.", palette: ["#2D3B36", "#8FA89B", "#C7B98F"] },
      { brand: "Прозрачно", title: "стеклодувная мастерская, питьевые стаканы и графины", context: "один мастер с 15-летним опытом, всё выдувается вручную при клиентах в открытой студии. Каждый предмет уникален — нет двух одинаковых стаканов. Можно записаться на индивидуальный мастер-класс и выдуть свой стакан под руководством.", palette: ["#A8C5D1", "#E8F0F2", "#4A6F7A"] },
      { brand: "Сруб", title: "разделочные доски и подносы из карельской берёзы", context: "мастер работает с деревом из своего региона, использует только сухостой и упавшие деревья. Гравировка на заказ — имена, даты, цитаты. Популярный свадебный и корпоративный подарок, доски маркируются номером и подписью мастера.", palette: ["#D4B896", "#8C6B4A", "#3E2E1F"] },
      { brand: "Северянка", title: "базовый трикотаж oversize", context: "всё шьётся в одной мастерской под Питером, тиражи по 50 штук. Принцип бренда — никаких сезонных коллекций, только постоянная капсула, которую можно докупать и доносить годами. Аудитория — женщины 25–40, уставшие от быстрой моды.", palette: ["#8E8273", "#E0DACE", "#3D3530"] },
      { brand: "Полынь", title: "женские льняные платья в стиле бохо-минимализм", context: "сезонные дропы по 4–6 моделей, каждая в трёх натуральных оттенках. Основательница лично снимает лукбук в полях и на побережье. Целевая аудитория — творческие женщины, кто ездит на ретриты и ценит свободный крой.", palette: ["#97A37F", "#D8CFB8", "#5B5A40"] },
      { brand: "Кант", title: "мужские рубашки из японского денима", context: "лимит 30 штук на модель, каждая рубашка пронумерована. Шьётся в ателье в Москве, фурнитура и пуговицы из Японии. Аудитория — мужчины 30+, ценящие крафт, готовые ждать рубашку 3–4 недели и платить за качество ткани.", palette: ["#2C3E5C", "#6B8AAD", "#1A1F2E"] },
      { brand: "Жук", title: "комбинезоны и боди из органического хлопка", context: "принты разрабатывают детские иллюстраторы, каждая коллекция — отдельная история про жука, ёжика или лису. Безопасные красители, плоские швы, кнопки вместо пуговиц. Бренд активен в инстаграме мам, основной канал — сарафан и рекомендации.", palette: ["#E8B4A0", "#F5E6D3", "#7C9A92"] },
      { brand: "Овца", title: "вязаные шапки и снуды из мериноса", context: "бренд работает напрямую с фермой в Дагестане, на каждой шапке бирка с именем овцы, от которой шерсть. Вязание ручное, мастерица одна, отсюда лимит — 10–15 шапок в неделю. Сезон стартует в сентябре, к декабрю всё распродано.", palette: ["#C9B89C", "#E8DDC9", "#5A4A3A"] },
      { brand: "Босиком", title: "анатомические сандалии ручной сборки", context: "кожа растительного дубления из Италии, колодка разработана ортопедом. Шьются на заказ под обмер стопы — клиент присылает фото и замеры. Аудитория — те, кто перешёл на минималистичную обувь и не возвращается обратно.", palette: ["#8B5A3C", "#D4A574", "#3D2818"] },
      { brand: "Холщовка", title: "холщовые сумки и тоуты с авторскими принтами", context: "коллабы с молодыми художниками — каждые 2 месяца новый автор и новая коллекция из 4–5 принтов. Часть выручки идёт автору как роялти. Цена доступная, аудитория — студенты, художники, посетители независимых книжных и кофеен.", palette: ["#D8C9A8", "#B85C3D", "#2D2D2D"] },
      { brand: "Серебро и шум", title: "авторские серебряные кольца с грубой фактурой", context: "единичные экземпляры, ювелир делает кольца методом литья по восковой модели — двух одинаковых не существует. Эстетика брутальная, никакой полировки до блеска. Аудитория — те, кто носит украшения каждый день и не снимает.", palette: ["#9C9C9C", "#D4D4D4", "#2A2A2A"] },
      { brand: "Жемчужница", title: "украшения из речного жемчуга неправильной формы", context: "основательница — женщина-ювелир, работает с барочным жемчугом (несимметричным). Серьги, кольца и подвески в серебре и золочении. Эстетика тихой роскоши, аудитория — женщины 30+, выбирающие украшения «на каждый день, но не базовые».", palette: ["#E8E0D5", "#D4B896", "#4A4035"] },
      { brand: "Латунь", title: "латунные серьги и браслеты в эстетике 70-х", context: "винтажные мотивы — крупные геометричные формы, матовая поверхность, состаренная фактура. Мастер вдохновляется советскими ювелирными журналами 70-х и переосмысляет формы. Цена средняя, аудитория — девушки, которые собирают образ из винтажа и носят украшения как акцент.", palette: ["#B8946A", "#E0BC8C", "#4A3520"] },
      { brand: "Корень", title: "кулоны из засушенных растений в эпоксидной смоле", context: "основательница собирает растения сама — в походах, на даче, в городских скверах. Каждый кулон сопровождается карточкой с названием растения и местом сбора. Аудитория — те, кто любит флористику, ботанику, природу — украшение становится личной историей, а не просто аксессуаром.", palette: ["#6B7A4A", "#C9B894", "#3D3520"] },
      { brand: "Травник", title: "натуральные бальзамы и масла на сибирских травах", context: "сырьё закупается у сибирских сборщиков, рецептуру разрабатывает основательница — биолог по образованию. Эко-упаковка из стекла и крафта, никакого пластика. Аудитория — женщины, которые читают составы и не покупают масс-маркет.", palette: ["#8FA078", "#D4C9A8", "#4A5235"] },
      { brand: "Мыловарня №7", title: "твёрдое мыло и шампуни малыми партиями", context: "минимум ингредиентов — 5–7 в каждом продукте, всё веган, без пальмового масла. Линейка из 7 ароматов, отсюда название. Продаётся в шоуруме и через сайт, упаковка — переработанная бумага с ручной печатью. Аудитория — осознанное потребление, zero waste, экоактивисты.", palette: ["#D4C9B8", "#E8DDC9", "#6B5C4A"] },
      { brand: "Нота", title: "нишевые духи с ароматами городов", context: "каждый аромат — попытка передать город через запах: Тбилиси, Лиссабон, Калининград, Владивосток. Малые партии по 100 флаконов, сольные релизы. Парфюмер — выпускник школы Гераса в Грассе. Аудитория — путешественники и парфманьяки, кто коллекционирует нишу.", palette: ["#4A3F4E", "#C9B8A0", "#1F1A24"] },
      { brand: "Дед", title: "масла и бальзамы для бороды", context: "ироничная коммуникация — упаковка стилизована под советскую аптеку, тексты на банках с юмором. Состав честно натуральный, разрабатывался с барбером. Аудитория — мужчины 25–45 с бородой, ценящие самоиронию и не любящие пафос beauty-индустрии.", palette: ["#8B6F47", "#C9B79C", "#2D2415"] },
      { brand: "Ладонь", title: "кремы и скрабы для рук, которые работают руками", context: "целевая аудитория — керамисты, садовники, художники, парикмахеры, повара. Формулы плотные, восстанавливающие, с акцентом на трещины и сухость. Часть линейки — в металлических банках, чтобы можно было открыть грязными руками. Бренд активно делает коллабы с мастерскими.", palette: ["#B8967A", "#E8D9C5", "#5C4838"] },
      { brand: "Аня Море", title: "семейная и lifestyle-съёмка на плёнку", context: "Аня снимает только на плёночные камеры — Pentax 67 и Mamiya. Выезжает в путешествия с семьями, снимает ретриты, семейные истории на побережье и в горах. Очередь на съёмки на 2–3 месяца вперёд. Аудитория — родители 30+, которые хотят память «как раньше», без обработки и фильтров.", palette: ["#7A8F9C", "#D4C9B8", "#2E3A42"] },
      { brand: "Студия 24", title: "предметная съёмка для малых брендов", context: "бюджетные пакеты для начинающих — от 15 кадров за фиксированную цену. Студия в спальном районе, оборудование на минимуме, но результат стабильный. Целевая аудитория — самозанятые мастера и небольшие шоурумы, которым нужны качественные карточки на маркетплейсы и в инстаграм.", palette: ["#C9C2B8", "#E8E0D5", "#3A3A3A"] },
      { brand: "Кадр", title: "короткие документальные фильмы о людях и ремёслах", context: "команда из двух человек — оператор и режиссёр. Снимают истории мастеров, фермеров, маленьких бизнесов в формате 3–7 минут. Стилистика спокойная, без музыкальных перегрузок и быстрого монтажа. Заказчики — бренды, которым нужен не рекламный ролик, а нарратив о людях за продуктом.", palette: ["#4A4035", "#B8967A", "#1F1A14"] },
      { brand: "Маша рисует", title: "портреты на заказ, обложки книг, открытки", context: "акварель и тушь, узнаваемая лёгкая линия. Маша работает в одиночку из домашней студии, принимает 5–7 заказов в месяц. Помимо клиентских работ, есть собственный мерч — открытки, постеры, блокноты. Аудитория клиентов — частники с подарками и небольшие издательства.", palette: ["#E8B8A0", "#C9D4E0", "#4A4040"] },
      { brand: "Лицо", title: "свадебный и выездной макияж", context: "чистая натуральная стилистика — никакого «инстаграмного» макияжа со стрелками и контурингом. Целевая аудитория — невесты 27–35, которые хотят выглядеть «как себя, только лучше». Работает по Москве и области, плюс выездные свадьбы по России и за границей. Запись через личный инстаграм.", palette: ["#E8C9B8", "#F5E6D3", "#8B6F5A"] },
      { brand: "Гардероб", title: "разбор гардероба и шопинг-сопровождение", context: "стилист работает онлайн (видеосозвон с гардеробом) и офлайн (выезд на дом + поход по магазинам). Не работает с трендами — фокус на индивидуальном стиле и капсуле. Аудитория — женщины 30–45, которые «потерялись» в гардеробе после декрета или смены работы.", palette: ["#B8967A", "#E0D5C5", "#3D3025"] },
      { brand: "Тонко", title: "минималистичные тату тонкой линией", context: "студия на одно кресло в центре города, мастер работает по предзаписи. Эскизы только авторские — никаких «скачанных из пинтереста». Запись через анкету: клиент описывает идею, мастер сам решает, берёт ли. Аудитория — девушки 20–30, для кого тату — это эстетика, а не история.", palette: ["#2A2A2A", "#F5F2ED", "#8B8B8B"] },
      { brand: "Усы", title: "барбершоп на одно кресло", context: "запись только через директ инстаграма, никаких онлайн-сервисов. Один мастер, один клиент в час, без спешки. Атмосфера — старая школа, виниловый проигрыватель, кофе в гранёных стаканах. Аудитория — мужчины, которым важна не скорость, а ритуал.", palette: ["#4A3525", "#C9A574", "#1A1410"] },
      { brand: "Лиза ведёт", title: "упаковка и ведение экспертных блогов", context: "специализация — локальные бренды и эксперты (психологи, нутрициологи, дизайнеры). Не работает с большими бюджетами и крупными аккаунтами — фокус на малом бизнесе, где нужна стратегия с нуля. Подход: сначала исследование аудитории и тон-оф-войс, потом контент-план, потом запуск. Клиентов берёт ограниченно, очередь на 1–2 месяца.", palette: ["#8B7A6B", "#D4C9B8", "#2D2820"] },
      { brand: "Слово", title: "тексты для сайтов, тон-оф-войс, нейминг", context: "копирайтер работает один, специализация — лендинги и брендинг для малых бизнесов в крафт-сфере. Не пишет SEO-простыни и продающие тексты «по формуле AIDA» — фокус на голосе бренда. Аудитория — основатели мастерских и шоурумов, которым нужно «звучать как живые люди».", palette: ["#A89578", "#E0D5C0", "#3D352A"] },
      { brand: "Разговор", title: "частная практика, КПТ", context: "психолог работает онлайн, специализация — тревожные расстройства и выгорание. Сессии 50 минут, формат — раз в неделю. Не ведёт громкий блог, но есть рассылка раз в месяц с заметками про работу с тревогой. Аудитория — взрослые 25–40, которые ищут «своего» психолога по рекомендациям.", palette: ["#6B8A9C", "#D4D9E0", "#2E3A42"] },
      { brand: "Звук", title: "занятия с детьми онлайн", context: "авторская методика — игровой формат через зум, занятия по 30 минут. Специализация — постановка звуков у детей 4–7 лет. Логопед записывает короткие видео-разборы для родителей в инстаграм. Аудитория — родители из небольших городов, где нет хорошего офлайн-логопеда.", palette: ["#E8B8C9", "#F5E6D3", "#8B6F8A"] },
      { brand: "Speak", title: "разговорный английский в формате клуба", context: "не уроки, а встречи — 6–8 человек, темы для обсуждения, ведущий-носитель. Формат подписки: 2 встречи в неделю по 90 минут. Никаких учебников и грамматики — только говорение. Аудитория — взрослые с уровнем B1+, которым нужна практика, а не теория.", palette: ["#D45C3D", "#F5C9A8", "#2D2025"] },
      { brand: "Вдох", title: "частные уроки и женские ретриты", context: "инструктор работает один на один или с малыми группами по 4–5 женщин. Стиль — мягкая хатха и инь-йога, без акробатики. Раз в сезон — выездные ретриты в Грузию или Карелию на 5 дней. Аудитория — женщины 30+, для которых йога это про восстановление, а не про спорт.", palette: ["#A8B894", "#E0DAC5", "#4A5538"] },
      { brand: "Шаг", title: "подготовка к первому марафону", context: "тренер ведёт групповые забеги по выходным в парке, плюс индивидуальные планы по подписке. Специализация — взрослые-новички, которые «никогда не бегали». Программа на 6 месяцев с целью «добежать без травм». Сообщество в чате, где участники поддерживают друг друга.", palette: ["#D4A52E", "#F5E6A8", "#2D3A1F"] },
      { brand: "Тарелка", title: "индивидуальные планы питания", context: "подход без жёстких диет и подсчёта калорий — фокус на привычки и баланс. Нутрициолог работает онлайн, формат — пакет на 2 месяца с еженедельными созвонами. Не продаёт БАДы и не запугивает «токсинами». Аудитория — женщины 30+, уставшие от диет и желающие наладить отношения с едой.", palette: ["#97A37F", "#E8D9B8", "#3D4530"] },
      { brand: "Тише", title: "коуч по сну для родителей младенцев", context: "помогает родителям детей от 0 до 2 лет наладить сон. Формат — разовые консультации (созвон + текстовый план) или сопровождение на 2 недели в чате. Без жёстких методик «дать проплакаться». Аудитория — измотанные родители, которые гуглят в три ночи «как уложить ребёнка».", palette: ["#6B7A9C", "#D4D9E5", "#2A3540"] },
      { brand: "Какао", title: "крафтовый шоколад bean-to-bar", context: "малые партии по 200 плиток, какао-бобы фермерские из Эквадора и Венесуэлы. Линейка из 6 моноплиток — каждая со своим происхождением и вкусовым профилем, как у кофе или вина. Упаковка с описанием фермы и нот. Продаётся в шоуруме и через специализированные магазины.", palette: ["#4A2818", "#B8784A", "#1F1410"] },
      { brand: "Овёс", title: "авторская гранола с необычными добавками", context: "вкусы вроде «мисо-карамель», «тимьян-абрикос», «розмарин-апельсин» — необычные сочетания, которых нет в масс-маркете. Формат подписки: пакет 500г каждые 2 или 4 недели. Производство в маленьком цеху, упаковка минималистичная. Аудитория — те, кто завтракает дома и устал от обычных мюсли.", palette: ["#C9A574", "#E8DDC9", "#5C4530"] },
      { brand: "Ферма Северная", title: "мягкие сыры с фермы", context: "ферма в Ленинградской области, 30 коз и небольшое стадо коров. Линейка из 5 сыров — шевр, бри, рикотта, моцарелла, сыр с золой. Доставка по Питеру и Москве раз в неделю фиксированными окнами. Аудитория — гастроэнтузиасты и рестораны, которые ценят локальное.", palette: ["#E8DDC5", "#D4B896", "#5C4A35"] },
      { brand: "Лист", title: "авторские чайные купажи", context: "купажист работает с китайскими и грузинскими чаями, делает собственные смеси с травами и специями. Линейка из 12 чаёв, плюс сезонные ограниченные. В шоуруме — дегустации по записи, гость пробует 4–5 чаёв с рассказом о каждом. Аудитория — чайные гики и те, кто перешёл с кофе на чай.", palette: ["#6B7A4A", "#C9B894", "#2D3A1F"] },
      { brand: "Обжарка вторник", title: "ростери с подпиской на свежее зерно", context: "обжаривают по вторникам, отправляют в среду — клиент получает кофе в течение 2–3 дней после обжарки. Линейка ротируется каждый месяц — 4 моносорта плюс эспрессо-смесь. Подписка: 250г или 500г раз в 2 недели. Аудитория — домашние бариста с эспрессо-машиной или V60.", palette: ["#4A2D1F", "#B8784A", "#1F1410"] },
      { brand: "Закваска", title: "хлеб на закваске", context: "всего 4 вида хлеба — пшеничный, ржаной, цельнозерновой, бородинский. Открыты 4 дня в неделю, пекут с 6 утра, к полудню всё разбирают. Никакой доставки и предзаказов — только живая очередь. Аудитория — местные жители района и хлебные энтузиасты, готовые ехать через весь город.", palette: ["#B8784A", "#E0C8A8", "#4A3525"] },
      { brand: "Стебель", title: "букеты в авторской стилистике", context: "эстетика «дикий сад» — никаких роз пачками и упаковочной плёнки, только сезонные цветы и травы. Флорист работает один, делает 3–5 букетов в день. Оформление мероприятий — свадьбы, ужины, открытия шоурумов. Аудитория — те, кто видел букеты в инстаграме и не хочет «как у всех».", palette: ["#B85C7A", "#D4C9A8", "#2D3525"] },
      { brand: "Зелёный угол", title: "продажа редких комнатных растений", context: "специализация — ароидные (монстеры, филодендроны, антуриумы), папоротники, редкие сорта. Шоурум маленький, 30–40 растений в наличии, остальное под заказ. Бесплатные консультации по уходу для покупателей. Аудитория — коллекционеры растений, plant parents с уже развитой коллекцией.", palette: ["#4A5C35", "#B8C9A0", "#1F2814"] },
      { brand: "Лохматый", title: "груминг собак мелких пород", context: "домашняя атмосфера вместо сетевого салона — один грумер, одна собака за раз, никаких клеток и ожидания. Специализация — йорки, шпицы, мальтезе, бишоны. Запись на 2–3 недели вперёд. Аудитория — владельцы маленьких собак, которые переживают за стресс питомца в обычных салонах.", palette: ["#D4B896", "#E8DDC9", "#8B6F5A"] },
      { brand: "Полка", title: "закрытый книжный клуб с подпиской", context: "30 участников, ежемесячные офлайн-встречи в книжном кафе плюс активный чат. Книгу выбирают голосованием, ведущий готовит вопросы для обсуждения. Подписка платная — это фильтр от случайных людей. Аудитория — читающие 28–40, которые скучают по университетским разговорам о книгах.", palette: ["#4A352A", "#B89478", "#1F1A14"] },
      { brand: "Ход", title: "мастерская авторских настолок", context: "команда из трёх человек разрабатывает оригинальные игры — стратегии и кооперативы. Финансирование через кикстартер и российские краудфандинговые платформы. Тиражи небольшие, 500–1000 копий, упаковка и компоненты премиальные. Аудитория — гик-сообщество, посетители игротек и фестивалей настолок.", palette: ["#4A3F8B", "#B89478", "#1A1A2E"] }
    ];

    const shown = new Set();
    let isLoading = false;

    function getTheme() {
      if (isLoading) return;

      if (shown.size === themes.length) shown.clear();
      const remaining = themes.filter((_, i) => !shown.has(i));
      const idx = themes.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
      shown.add(idx);
      const theme = themes[idx];

      const card = document.getElementById('card');
      card.classList.add('flash');
      isLoading = true;

      setTimeout(() => {
        const title = nobr(theme.title.charAt(0).toUpperCase() + theme.title.slice(1));
        const context = nobr(theme.context.charAt(0).toUpperCase() + theme.context.slice(1));
        const brand = nobr(theme.brand);
        const swatches = theme.palette.map(hex => `
          <div class="swatch">
            <div class="swatch-color" style="background:${hex}"></div>
            <div class="swatch-hex">${hex}</div>
          </div>
        `).join('');
        card.innerHTML = `
          <div class="card-brand">${brand}</div>
          <h2 class="card-title">${title}</h2>
          <p class="card-context">${context}</p>
          <div class="palette">${swatches}</div>
        `;
        card.classList.remove('flash');
        document.getElementById('btnText').textContent = 'Следующая тема';
        isLoading = false;
      }, 150);
    }
  </script>
